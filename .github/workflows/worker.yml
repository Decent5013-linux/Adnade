name: Run Worker Sequentially

on:
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install expect
        run: |
          sudo apt update
          sudo apt install expect -y

      - name: Run workers with delay
        run: |
          chmod +x worker.exp

          ./worker.exp &
          sleep 5

          ./worker.exp &
          sleep 5

          ./worker.exp &

          wait
